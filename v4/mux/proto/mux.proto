syntax = "proto3";

package tlswrapper.mux.v1;

option go_package = "github.com/hexian000/tlswrapper/v4/mux/proto";

// Chunk carries payload bytes for a logical stream (one gRPC Stream RPC).
message Chunk {
  bytes data = 1;
}

// ClientHello is sent by the client as the first message on the Control stream.
message ClientHello {
  string service_id     = 1;
  bool   reject_inbound = 2;
}

// ServerHello is sent by the server in response to ClientHello on the Control stream.
message ServerHello {
  string service_id     = 1;
  bool   reject_inbound = 2;
}

// OpenRequest is sent by the server on the Control stream to ask the client to
// open a new Stream RPC back to the server. The client identifies the resulting
// Stream RPC by setting x-mux-request-id in the outgoing gRPC metadata to
// request_id.
message OpenRequest {
  string request_id = 1;
}

// ControlMessage is the envelope for all messages on the Control stream.
message ControlMessage {
  oneof body {
    ClientHello client_hello = 1;
    ServerHello server_hello = 2;
    OpenRequest open_request = 3;
  }
}

// Mux provides logical stream multiplexing over one gRPC connection.
//
// Lifecycle:
//  1. Client calls Control; sends ClientHello; server replies with ServerHello.
//     The control stream stays open for the lifetime of the session.
//  2. Client-initiated streams: client calls Stream directly.
//  3. Server-initiated streams: server sends OpenRequest on Control;
//     client calls Stream with x-mux-request-id metadata set to request_id.
service Mux {
  // Control is a long-lived bidi stream used for session handshake and
  // server-side stream initiation.
  rpc Control(stream ControlMessage) returns (stream ControlMessage);

  // Stream is a single logical bidirectional byte stream.
  // Client-initiated: no special metadata required.
  // Server-initiated: client sets x-mux-request-id metadata to the
  // request_id from the OpenRequest message received on Control.
  rpc Stream(stream Chunk) returns (stream Chunk);
}
